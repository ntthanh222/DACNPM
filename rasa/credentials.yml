# Rasa credentials file
# Add your credentials here if needed for external services

# Action server endpoint
action_endpoint:
  url: "http://rasa-actions:5055/webhook"

# Redis tracker store for conversation persistence
tracker_store:
  type: redis
  url: redis
  port: 6379
  db: 0
  password: null
  use_ssl: false
  key_prefix: "rasa_tracker_"

# Redis lock store for distributed locking
lock_store:
  type: redis
  url: redis
  port: 6379
  db: 1
  password: null
  use_ssl: false

rest:
  # Enable REST channel for FastAPI communication

